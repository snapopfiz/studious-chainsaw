<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRSE v2 - Pistol Calculator</title>
  <style>
    :root { --bg: #0f172a; --card: #1e2937; --accent: #3b82f6; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: var(--bg); 
      color: #e2e8f0; 
      margin:0; 
      padding:15px; 
      line-height:1.5; 
    }
    .container { 
      max-width: 1000px; 
      margin: auto; 
      background: var(--card); 
      border-radius: 12px; 
      overflow: hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
    }
    header { 
      background: linear-gradient(135deg, #1e40af, #3b82f6); 
      padding: 25px; 
      text-align: center; 
    }
    .nav { 
      background: #1e2937; 
      padding: 12px; 
      text-align: center; 
      margin: 10px 0; 
      border-radius: 8px;
    }
    .nav a { 
      color: white; 
      margin: 0 12px; 
      text-decoration: none; 
      font-weight: 600; 
      padding: 8px 16px; 
      border-radius: 6px;
    }
    .nav a:hover { background: #3b82f6; }
    
    .content { padding: 25px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 600; 
      color: #cbd5e1; 
    }
    input, select, button { 
      padding: 12px; 
      border-radius: 8px; 
      border: none; 
      background: #334155; 
      color: white; 
      width: 100%; 
      max-width: 340px; 
      font-size: 1rem; 
    }
    button { 
      background: var(--accent); 
      cursor: pointer; 
      font-weight: bold; 
      max-width: none; 
    }
    button:hover { background: #60a5fa; }

    .presets { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 10px; 
      margin: 15px 0; 
    }
    .preset-btn { 
      padding: 12px; 
      background: #334155; 
      border: 1px solid #475569; 
      border-radius: 8px; 
      text-align: center; 
      cursor: pointer; 
    }
    .preset-btn:hover, .preset-btn.active { 
      background: #3b82f6; 
      border-color: #60a5fa; 
    }
    .result { 
      font-size: 2.2rem; 
      font-weight: bold; 
      color: #60a5fa; 
      margin: 20px 0; 
      padding: 15px; 
      background: #1e2937; 
      border-radius: 10px; 
    }
    .explanation { 
      background: #1e2937; 
      padding: 18px; 
      border-radius: 10px; 
      margin: 20px 0; 
      border-left: 5px solid #60a5fa; 
    }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>MRSE v2 — Pistol Calculator</h1></header>
    
    <!-- Top Navigation -->
    <div class="nav">
      <a href="index.html">🏠 Home</a>
      <a href="pistol.html">🔫 Pistol</a>
      <a href="rifle.html">🏹 Rifle</a>
      <a href="bigbore.html">🦬 Big Bore</a>
    </div>

    <div class="content">
      <h2>Quick Pistol Presets</h2>
      <div class="presets" id="presets"></div>

      <h2>Manual Input</h2>
      <div class="input-group"><label>Bullet Weight (grains)</label><input type="number" id="W" value="124"></div>
      <div class="input-group"><label>Velocity (fps)</label><input type="number" id="V" value="1180"></div>
      <div class="input-group"><label>Expanded Diameter (inches)</label><input type="number" id="D_exp" value="0.58" step="0.01"></div>
      <div class="input-group"><label>Penetration (inches in gel)</label><input type="number" id="P" value="14" step="0.1"></div>
      <div class="input-group"><label>Reliability Factor (0.7–1.1)</label><input type="number" id="R" value="1.05" step="0.05"></div>
      
      <div class="input-group">
        <label>Shot Placement</label>
        <select id="PM">
          <option value="2.5">Brain / Upper Spine (2.5)</option>
          <option value="1.8" selected>Heart / Major Vessels (1.8)</option>
          <option value="1.3">Lungs / Vital Torso (1.3)</option>
          <option value="0.8">Non-vital Torso (0.8)</option>
          <option value="0.3">Extremity (0.3)</option>
        </select>
      </div>
      
      <div class="input-group"><label>Number of Shots</label><input type="number" id="shots" value="2" min="1" max="6"></div>

      <button onclick="calculateMRSE()">Calculate MRSE</button>

      <div class="result" id="result">—</div>
      <div class="explanation" id="explanation"></div>

      <h2>Data Sources</h2>
      <ul>
        <li><a href="https://www.luckygunner.com/labs" target="_blank">Lucky Gunner Labs – Gel Tests</a></li>
        <li><a href="https://www.federalpremium.com/" target="_blank">Federal HST</a></li>
        <li><a href="https://www.speer-ammo.com/" target="_blank">Speer Gold Dot</a></li>
        <li><a href="https://www.hornady.com/" target="_blank">Hornady Critical Defense/Duty</a></li>
      </ul>
    </div>

    <!-- Bottom Navigation -->
    <div class="nav">
      <a href="index.html">🏠 Home</a>
      <a href="pistol.html">🔫 Pistol</a>
      <a href="rifle.html">🏹 Rifle</a>
      <a href="bigbore.html">🦬 Big Bore</a>
    </div>
  </div>

  <script>
    const presets = [
      {name: "9mm 124gr Gold Dot", W:124, V:1180, D_exp:0.58, P:14, R:1.05},
      {name: "9mm 147gr HST", W:147, V:1050, D_exp:0.62, P:15.5, R:1.08},
      {name: "9mm 135gr +P Critical Duty", W:135, V:1250, D_exp:0.60, P:13, R:1.0},
      {name: ".40 S&W 180gr HST", W:180, V:980, D_exp:0.68, P:14, R:1.05},
      {name: ".45 ACP 230gr HST", W:230, V:890, D_exp:0.72, P:15, R:1.05},
      {name: ".380 95gr HST", W:95, V:960, D_exp:0.52, P:11, R:0.85}
    ];

    function loadPresets() {
      const container = document.getElementById('presets');
      container.innerHTML = '';
      presets.forEach(preset => {
        const btn = document.createElement('div');
        btn.className = 'preset-btn';
        btn.textContent = preset.name;
        btn.onclick = () => {
          document.getElementById('W').value = preset.W;
          document.getElementById('V').value = preset.V;
          document.getElementById('D_exp').value = preset.D_exp;
          document.getElementById('P').value = preset.P;
          document.getElementById('R').value = preset.R;
          calculateMRSE();
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
        container.appendChild(btn);
      });
    }

    function getExplanation(mrse) {
      if (mrse < 30) return "<strong>Marginal</strong><br>Limited stopping power. Requires excellent placement and multiple hits.";
      else if (mrse < 50) return "<strong>Solid</strong><br>Good modern defensive load. Reliable with proper hits.";
      else if (mrse < 70) return "<strong>Excellent</strong><br>Very strong performance in real-world conditions.";
      else return "<strong>Outstanding</strong><br>Extremely high stopping potential with good shot placement.";
    }

    function calculateMRSE() {
      const W = parseFloat(document.getElementById('W').value) || 0;
      const V = parseFloat(document.getElementById('V').value) || 0;
      const D_exp = parseFloat(document.getElementById('D_exp').value) || 0;
      const P = parseFloat(document.getElementById('P').value) || 0;
      const R = parseFloat(document.getElementById('R').value) || 1;
      const PM = parseFloat(document.getElementById('PM').value);
      const shots = parseFloat(document.getElementById('shots').value) || 1;

      const A_exp = Math.PI * Math.pow(D_exp / 2, 2);
      const E_f = V / 1000;
      let momentum_term = (W * V * A_exp * E_f) / 7000;

      let P_f = 1.0;
      if (P < 12) P_f = P / 12;
      else if (P > 18) P_f = 18 / P;

      const M_f = Math.min(1.0 + 0.3 * (shots - 1), 2.3);
      const mrse = momentum_term * P_f * R * PM * M_f;
      const rounded = mrse.toFixed(1);

      const rating = mrse < 30 ? 'Marginal' : mrse < 50 ? 'Solid' : mrse < 70 ? 'Excellent' : 'Outstanding';

      document.getElementById('result').innerHTML = `<strong>MRSE: ${rounded}</strong><br>Rating: ${rating}`;
      document.getElementById('explanation').innerHTML = getExplanation(mrse);
    }

    window.onload = loadPresets;
  </script>
</body>
</html>
